<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!--
    Puerto — logo icon
    3 cargo containers = business · infrastructure · presentation
    Teal #0891B2 · Indigo #6366F1 · Orange #F97316
  -->

  <!-- Container 1: business layer (teal) -->
  <rect x="7" y="11" width="14" height="20" rx="2" fill="#0891B2"/>
  <rect x="10" y="14" width="8" height="2" rx="1" fill="white" opacity="0.35"/>
  <rect x="10" y="18" width="8" height="1.5" rx="0.75" fill="white" opacity="0.2"/>
  <rect x="10" y="22" width="8" height="1.5" rx="0.75" fill="white" opacity="0.2"/>

  <!-- Container 2: infrastructure layer (indigo) -->
  <rect x="25" y="11" width="14" height="20" rx="2" fill="#6366F1"/>
  <rect x="28" y="14" width="8" height="2" rx="1" fill="white" opacity="0.35"/>
  <rect x="28" y="18" width="8" height="1.5" rx="0.75" fill="white" opacity="0.2"/>
  <rect x="28" y="22" width="8" height="1.5" rx="0.75" fill="white" opacity="0.2"/>

  <!-- Container 3: presentation layer (rust/orange) -->
  <rect x="43" y="11" width="14" height="20" rx="2" fill="#F97316"/>
  <rect x="46" y="14" width="8" height="2" rx="1" fill="white" opacity="0.35"/>
  <rect x="46" y="18" width="8" height="1.5" rx="0.75" fill="white" opacity="0.2"/>
  <rect x="46" y="22" width="8" height="1.5" rx="0.75" fill="white" opacity="0.2"/>

  <!-- Deck rail (top) -->
  <rect x="4" y="31" width="56" height="2" rx="1" fill="#2D5986"/>

  <!-- Deck surface -->
  <rect x="4" y="33" width="56" height="4" rx="0" fill="#1E3A5F"/>

  <!-- Hull (trapezoid — slightly narrower at bottom) -->
  <path d="M4 37 L60 37 L55 52 L9 52 Z" fill="#1E3A5F"/>

  <!-- Hull highlight — light edge at top of hull -->
  <path d="M4 37 L60 37" stroke="#2D5986" stroke-width="1" stroke-linecap="round"/>

  <!-- Water line -->
  <path d="M2 53 Q16 50.5 32 53 Q48 55.5 62 53" stroke="#0891B2" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Wake / reflection -->
  <path d="M6 57 Q19 55 32 57 Q45 59 58 57" stroke="#0891B2" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.25"/>
</svg>
